    <!-- Fonts: discovered immediately by the preload scanner (instead of a late
         @import inside the CSS bundle) so they start downloading on the first
         byte. The loading splash stays up until they are ready, so the
         fallback->web-font swap happens behind it (no visible FOUT). -->

    <title>EVA</title>

    <!-- Critical splash styles. Inlined so the loader paints on the very first
         frame (no white flash, no wait for the JS bundle or fonts). These
         .eva-* rules match the React <LoadingScreen /> (defined in index.css). -->
    <style>
      html,
      body {
        margin: 0;
        background: #000000;
      }

      /* While the splash is up, lock scroll so the app mounting behind it can't
         toggle the scrollbar and shove the centred EVA loader sideways
         (the "jumping" layout shift). Auto-restores when #app-loader is gone. */
      html:has(#app-loader) {
        overflow: hidden;
      }

      #app-loader {
        position: fixed;
        inset: 0;
        z-index: 100000;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #000000;
        opacity: 1;
        transition: opacity 0.6s ease;
      }
      #app-loader.is-hidden {
        opacity: 0;
        pointer-events: none;
      }

      .eva-loader__svg {
        overflow: visible;
        display: block;
      }

      /* Repeating dash → 6 light segments flow around every letter at once, so
         there is no single visible start/end. The animation advances by exactly
         one dash period (-300 over pathLength 1800) → perfectly seamless. NO
         filters (those re-rasterise per frame and caused the lag). */
      .eva-travel {
        stroke-dasharray: 120 180;
        animation: evaTravel 2.8s linear infinite;
        will-change: stroke-dashoffset;
      }
      @keyframes evaTravel {
        to {
          stroke-dashoffset: -300px;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .eva-travel {
          animation: none;
          stroke-dasharray: none;
        }
        #app-loader {
          transition: none;
        }
      }
    </style>
  </head>
